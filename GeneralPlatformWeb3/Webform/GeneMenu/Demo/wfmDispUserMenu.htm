        function showthis(Tid) {
            var c = document.getElementsByTagName("table");
            var l = c.length;
            var i;
            if (Tid.length == 8) {
                alert("length == 8");
                for (i = 0; i < l; i++) {
                    str = c[i].id;
                    if (str == Tid) {
                        if (c[i].style.display == "")
                            c[i].style.display = "none";
                        else
                            c[i].style.display = "";
                        break;
                    }
                }
            }
            else {
                for (i = 0; i < l; i++) {
                    str = c[i].id;
                    str = str.substr(0, 4);
                    if (str == "menu") {
                        c[i].style.display = "none";
                    }
                }
                showFather(Tid);
                showBrother(Tid);
                showSon(Tid);
            }

        }
        function showSon(Tid) {
            var c = document.getElementsByTagName("table");
            c[Tid].style.display = "";
            var i;
            for (i = 0; i < 9; i++) {
                if (c[Tid + i] != null) {
                    if (c[Tid + i].style.display = "none")
                        c[Tid + i].style.display = "";
                }
            }
        }
        function showFather(Tid) {
            var c = document.getElementsByTagName("table");
            if (Tid != "menu") {
                var father = Tid.substring(0, Tid.length - 1);
                if (c[father] != null) {
                    c[father].style.display = "";
                    showFather(father);
                }
            }
            else
                return;
        }
        function showBrother(Tid) {
            var c = document.getElementsByTagName("table");
            if (Tid != "menu") {
                var father = Tid.substring(0, Tid.length - 1);
                if (c[father] != null)
                    showSon(father);
            }
        }
